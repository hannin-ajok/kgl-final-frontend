<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales – KGL Groceries</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body class="dashboard-page">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-logo">🌾 <span>KGL</span> Groceries</div>
        <div class="sidebar-user">
          <strong id="sidebarName">User</strong><span id="sidebarRole"></span>
        </div>
        <nav id="sidebarNav"></nav>
        <div class="sidebar-footer">
          <button onclick="logout()">🚪 Logout</button>
        </div>
      </div>
      <div class="main-content">
        <div class="page-header">
          <h1>Record Sale</h1>
          <p>Record a new produce sale</p>
        </div>
        <div id="alertBox" class="alert hidden"></div>
        <!-- Two-panel layout: form on the left, latest transactions on the right. -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px">
          <div class="card">
            <div class="form-title">New Sale</div>
            <form id="salesForm">
              <div class="form-group">
                <label>Select Produce</label>
                <select id="produceSelect" required>
                  <option value="">-- Select produce --</option>
                </select>
              </div>
              <div class="form-group">
                <label>Available Stock</label
                ><input
                  type="text"
                  id="availableStock"
                  readonly
                  style="background: #f0f0f0"
                />
              </div>
              <div class="form-group">
                <label>Tonnage to Sell</label
                ><input
                  type="number"
                  id="tonnage"
                  min="0.1"
                  step="0.1"
                  required
                />
              </div>
              <div class="form-group">
                <label>Amount Paid (UGX)</label
                ><input type="number" id="amountPaid" min="0" required />
              </div>
              <div class="form-group">
                <label>Buyer Name</label
                ><input type="text" id="buyerName" required />
              </div>
              <button
                type="submit"
                id="submitBtn"
                class="btn btn-primary"
                style="width: 100%"
              >
                Record Sale
              </button>
            </form>
          </div>
          <div class="card">
            <div class="section-header"><h2>Recent Sales</h2></div>
            <table>
              <thead>
                <tr>
                  <th>Produce</th>
                  <th>Tonnage</th>
                  <th>Amount</th>
                  <th>Buyer</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="salesTable">
                <tr>
                  <td colspan="5" style="text-align: center; color: #757575">
                    Loading...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/utils.js"></script>
    <!-- sidebar.js and sales.js rely on shared auth/api utilities -->
    <script src="../js/sidebar.js"></script>
    <script src="../js/sales.js"></script>
  </body>
</html>
