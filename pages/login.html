<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KARIBU GROCERIES LTD</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <style>
      /* Keep the auth card centered and readable across screen sizes. */
      .login-box {
        width: 100%;
        max-width: 400px;
        padding: 24px;
      }
      /* Brand lockup sits above the sign-in form for quick recognition. */
      .login-logo {
        text-align: center;
        margin-bottom: 32px;
      }
      .login-logo h1 {
        color: #1b5e20;
        font-size: 26px;
        background-color: white;
        padding: 4px 8px;
      }
      .login-logo p {
        color: #1b5e20;
        font-size: 14px;
        margin-top: 4px;
        background-color: white;
        padding: 2px 4px;
      }
      .card {
        padding: 32px;
      }
      .card h2 {
        font-size: 20px;
        margin-bottom: 24px;
        color: #1b5e20;
      }
    </style>
  </head>
  <body class="login-page" >
    <div class="login-box">
      <div class="login-logo">
        <h1>KARIBU GROCERIES LTD</h1>
        <p>Management System</p>
      </div>
      <div class="card">
        <h2>Sign In</h2>
        <div id="alertBox" class="alert hidden"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <button
            type="submit"
            id="loginBtn"
            class="btn btn-primary"
            style="width: 100%; margin-top: 8px"
          >
            Login
          </button>
        </form>
      </div>
    </div>
    <script src="../js/utils.js"></script>
    <!-- auth.js depends on helpers from utils.js -->
    <script src="../js/auth.js"></script>
  </body>
</html>
